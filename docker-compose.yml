      context: .
      dockerfile: Dockerfile
      args:
        - CHRYSALIS_REPO=${CHRYSALIS_REPO:-https://github.com/SAIB-Inc/Chrysalis.git}
        - CHRYSALIS_SHA=${CHRYSALIS_SHA:-d50ae2cf7fa4e3df0cba10986908b95fe3f1714f}
        - UPLC_TURBO_REPO=${UPLC_TURBO_REPO:-https://github.com/pragma-org/uplc.git}
