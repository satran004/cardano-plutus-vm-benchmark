name: Plutus VM Benchmarks

on:
  schedule:
    - cron: "0 4 * * 0"  # Weekly, Sunday 4 AM UTC
  workflow_dispatch:
    inputs:
      vms:
        description: "Comma-separated VMs to run (or 'all')"
        required: false
        default: "all"
        type: string

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build benchmark image
        run: docker compose build

      - name: Run benchmarks
        run: |
          VMS="${{ github.event.inputs.vms || 'all' }}"
          if [ "$VMS" = "all" ]; then
            docker compose run --rm benchmark
          else
            docker compose run --rm -e BENCH_VMS="$VMS" benchmark
          fi

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          DATE=$(date +%Y-%m-%d)
          git commit -m "bench: results ${DATE}" || echo "No changes to commit"
          git push || echo "Push failed"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: results/
          retention-days: 90
